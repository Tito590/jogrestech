<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
    .product-card { transition: all 0.2s ease; }
    .active-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    /* Sembunyikan scrollbar navigasi tapi tetap bisa digeser */
    .nav-scroll::-webkit-scrollbar { display: none; }
    .nav-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-gray-900">

  <header class="bg-white border-b py-6 text-center shadow-sm">
    <h1 class="text-2xl font-extrabold text-indigo-600 tracking-tight">JOGRESTECH SHOP 🛍️</h1>
    <p class="text-[10px] text-gray-400 font-medium">Katalog Affiliate Berbasis CSV</p>
  </header>

  <nav class="sticky top-0 bg-white/90 backdrop-blur-md shadow-sm z-40 py-3 border-b overflow-x-auto nav-scroll">
    <div class="container mx-auto px-4 flex flex-nowrap md:flex-wrap gap-2 justify-start md:justify-center">
        <button class="cat-btn active-cat whitespace-nowrap px-5 py-2 rounded-xl border text-[11px] font-bold transition-all" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn whitespace-nowrap px-5 py-2 rounded-xl border text-[11px] font-bold transition-all" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn whitespace-nowrap px-5 py-2 rounded-xl border text-[11px] font-bold transition-all" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
        <button class="cat-btn whitespace-nowrap px-5 py-2 rounded-xl border text-[11px] font-bold transition-all" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn whitespace-nowrap px-5 py-2 rounded-xl border text-[11px] font-bold transition-all" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn whitespace-nowrap px-5 py-2 rounded-xl border text-[11px] font-bold transition-all" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <div id="loading" class="text-center py-10 hidden">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent mb-2"></div>
        <p class="font-bold text-gray-400 text-xs">Menyinkronkan Link...</p>
    </div>
    
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
  </main>

  <script>
    const CSV_FILES = {
        gadget: 'gadget.csv',
        elektronik: 'elektronik.csv',
        otomotif: 'otomotif.csv',
        sport: 'sport.csv',
        peralatan_rumah: 'rumah.csv'
    };

    let currentCategory = 'all';

    // FUNGSI UTAMA: Membuka Link Affiliate
    function goToAffiliate(url) {
        if (!url || url === "#" || url.length < 5) {
            alert("Maaf, link produk ini belum tersedia.");
            return;
        }
        // Bersihkan karakter liar (kutip, spasi)
        const target = url.replace(/["']/g, "").trim();
        window.open(target, '_blank', 'noopener,noreferrer');
    }

    async function loadData(cat) {
        try {
            const res = await fetch(`${CSV_FILES[cat]}?t=${Date.now()}`);
            if (!res.ok) return [];
            const text = await res.text();
            return parseCSV(text, cat);
        } catch (e) { return []; }
    }

    function parseCSV(text, catLabel) {
        // Pisahkan baris dengan aman
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        if (lines.length < 2) return [];

        // Deteksi Header
        const headers = lines[0].toLowerCase().split(",");
        const iNama = headers.findIndex(h => h.includes("nama"));
        const iHarga = headers.findIndex(h => h.includes("harga"));
        const iLink = headers.findIndex(h => h.includes("komisi") || h.includes("extra") || h.includes("link"));
        const iGambar = headers.findIndex(h => h.includes("gambar"));

        const items = [];
        for (let i = 1; i < lines.length; i++) {
            try {
                // Split kolom dengan penanganan tanda kutip (CSV Standard)
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ""));
                
                if (!cols[iNama]) continue;

                // Ambil link dari kolom Komisi Ekstra
                let finalLink = cols[iLink] || "#";
                if (finalLink !== "#" && !finalLink.startsWith("http")) {
                    finalLink = "https://" + finalLink;
                }

                // Gambar via Proxy Weserv
                let rawImg = cols[iGambar] || "";
                let displayImg = rawImg 
                    ? `https://images.weserv.nl/?url=${encodeURIComponent(rawImg)}&w=300&fit=cover` 
                    : "https://placehold.co/300x300?text=No+Image";

                items.push({
                    name: cols[iNama],
                    price: cols[iHarga] || "Cek Harga",
                    link: finalLink,
                    img: displayImg,
                    category: catLabel
                });
            } catch (err) { continue; }
        }
        return items;
    }

    async function renderApp() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');
        
        loader.classList.remove('hidden');
        grid.innerHTML = '';

        let allData = [];
        if (currentCategory === 'all') {
            for (const key in CSV_FILES) {
                const data = await loadData(key);
                allData = [...allData, ...data];
            }
        } else {
            allData = await loadData(currentCategory);
        }

        if (allData.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 text-xs italic">Belum ada produk di kategori ini.</div>`;
        } else {
            grid.innerHTML = allData.map(p => `
                <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col shadow-sm hover:border-indigo-200">
                    <div class="aspect-square bg-gray-50 overflow-hidden">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-3 flex flex-col flex-grow">
                        <span class="text-[8px] font-black text-indigo-500 uppercase tracking-tighter mb-1">${p.category}</span>
                        <h3 class="text-[11px] font-bold text-gray-800 line-clamp-2 h-8 mb-2 leading-tight">${p.name}</h3>
                        <div class="mt-auto">
                            <p class="text-red-600 font-extrabold text-sm mb-3">${p.price}</p>
                            <button onclick="goToAffiliate('${p.link}')" 
                                    class="w-full bg-indigo-600 text-white py-2.5 rounded-xl text-[10px] font-black active:scale-95 transition-transform shadow-md shadow-indigo-100">
                                BELI SEKARANG
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        loader.classList.add('hidden');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.toggle('active-cat', btn.getAttribute('onclick').includes(`'${cat}'`));
        });
        renderApp();
    }

    document.addEventListener('DOMContentLoaded', renderApp);
  </script>
</body>
</html>
