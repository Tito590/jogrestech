<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop - Katalog Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    .active-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

  <header class="bg-white border-b py-8 text-center">
    <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">JOGRESTECH SHOP 🛍️</h1>
    <p class="text-gray-500 mt-1 text-sm">Katalog Affiliate Terpercaya</p>
  </header>

  <nav class="sticky top-0 bg-white/90 backdrop-blur-md shadow-sm z-40 py-4 border-b">
    <div class="container mx-auto px-4 flex flex-wrap gap-2 justify-center">
        <button class="cat-btn active-cat px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-10">
    <div id="loading" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent mb-4"></div>
        <p class="font-bold text-gray-400">Memuat Data Produk...</p>
    </div>
    
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
  </main>

  <script>
    /* ================= SETTING ================= */
    // Nama file CSV yang Anda upload ke GitHub (satu folder dengan shop.html)
    const CSV_FILE = 'data.csv'; 

    let currentCategory = 'all';
    let allProductData = [];

    /* ================= LOGIKA UTAMA ================= */

    async function loadData() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');
        
        try {
            // Mengambil file CSV dari repository sendiri
            const res = await fetch(CSV_FILE);
            if (!res.ok) throw new Error("File CSV tidak ditemukan");
            
            const text = await res.text();
            allProductData = parseCSV(text);
            
            render();
        } catch (e) {
            console.error("Gagal muat data:", e);
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400">Gagal memuat file <b>${CSV_FILE}</b>. Pastikan file sudah diupload ke GitHub.</div>`;
        }
        
        loader.classList.add('hidden');
    }

    function parseCSV(text) {
        const rows = text.split('\n')
            .filter(row => row.trim() !== '')
            .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, '')));
        
        if (rows.length < 2) return [];

        const headers = rows[0].map(h => h.toLowerCase());
        
        // Cari posisi kolom secara otomatis (fleksibel nama)
        const iNama = headers.findIndex(h => h.includes('nama'));
        const iHarga = headers.findIndex(h => h.includes('harga'));
        const iLink = headers.findIndex(h => h.includes('link') || h.includes('komisi'));
        const iGambar = headers.findIndex(h => h.includes('gambar') || h.includes('foto'));

        return rows.slice(1).map(r => {
            if (!r[iNama]) return null;
            
            let rawImg = (iGambar !== -1) ? r[iGambar] : '';
            // Proxy weserv agar gambar Shopee bisa muncul di semua perangkat
            let finalImg = rawImg 
                ? `https://images.weserv.nl/?url=${encodeURIComponent(rawImg)}&w=400&fit=cover` 
                : 'https://placehold.co/400x400/f3f4f6/a1a1aa?text=No+Image';

            return {
                name: r[iNama],
                price: r[iHarga] || 'Cek Harga',
                link: r[iLink],
                img: finalImg
            };
        }).filter(item => item !== null);
    }

    function render() {
        const grid = document.getElementById('product-grid');
        
        // Karena sementara semua kategori pakai link yang sama, 
        // filter ini hanya akan berjalan jika Anda menambah logika kategori di CSV nanti.
        // Untuk sekarang, semua produk ditampilkan.
        const filtered = allProductData;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">Tidak ada produk dalam file CSV.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col group">
                <div class="relative aspect-square bg-gray-50 overflow-hidden">
                    <img src="${p.img}" alt="${p.name}" 
                         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                         onerror="this.src='https://placehold.co/400x400/eeeeee/999999?text=Error+Image'">
                </div>
                <div class="p-4 flex flex-col flex-grow">
                    <h3 class="text-sm font-bold text-gray-800 line-clamp-2 h-10 mb-2 leading-tight">${p.name}</h3>
                    <div class="mt-auto">
                        <p class="text-red-600 font-extrabold text-lg mb-3">${p.price}</p>
                        <a href="${p.link}" target="_blank" rel="nofollow" 
                           class="block w-full bg-gray-900 text-white text-center py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-600 transition-colors">
                           BELI SEKARANG
                        </a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active-cat');
            const txt = btn.innerText.toLowerCase();
            if ((cat === 'all' && txt.includes('semua')) || txt.includes(cat)) {
                btn.classList.add('active-cat');
            }
        });
        // Karena link CSV-nya sama untuk semua kategori, render ulang saja
        render();
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
