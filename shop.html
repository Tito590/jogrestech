<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affiliate Catalog - Image Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .product-card { transition: all 0.3s ease; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 700px; width: 100%; max-height: 90%; overflow-y: auto; }
    .hidden { display: none; }
    .active-cat { background-color: #4f46e5 !important; color: white !important; }
  </style>
</head>
<body class="bg-gray-100">

  <header class="bg-indigo-600 text-white py-10 text-center">
    <h1 class="text-4xl font-bold">Katalog Produk Shopee 🛍️</h1>
    <p class="mt-2 opacity-80">Tekan Ctrl + Shift + A untuk Input URL Sheets</p>
  </header>

  <nav class="sticky top-0 bg-white shadow-md z-40 py-4">
    <div class="container mx-auto px-6 flex flex-wrap gap-3 justify-center">
        <button class="cat-btn active-cat px-6 py-2 rounded-full border text-sm font-bold" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn px-6 py-2 rounded-full border text-sm font-bold" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn px-6 py-2 rounded-full border text-sm font-bold" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
        <button class="cat-btn px-6 py-2 rounded-full border text-sm font-bold" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn px-6 py-2 rounded-full border text-sm font-bold" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn px-6 py-2 rounded-full border text-sm font-bold" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
    </div>
  </nav>

  <main class="container mx-auto px-6 py-10">
    <div id="loading" class="text-center py-10 hidden text-indigo-600 font-bold">Sinkronisasi Data...</div>
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </main>

  <div id="admin-modal" class="modal hidden">
    <div class="modal-content">
      <h2 class="text-2xl font-bold mb-4">⚙️ Admin Panel</h2>
      <div class="space-y-4" id="url-inputs">
        </div>
      <button onclick="saveUrls()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-6">Simpan & Refresh</button>
      <button onclick="toggleAdmin()" class="w-full text-gray-400 mt-2 text-sm">Tutup</button>
    </div>
  </div>

  <script>
    const categories = ['sport', 'peralatan_rumah', 'otomotif', 'gadget', 'elektronik'];
    let currentCategory = 'all';
    let urls = JSON.parse(localStorage.getItem('sheet_urls')) || {};

    // Generate Input di Admin
    const inputDiv = document.getElementById('url-inputs');
    categories.forEach(cat => {
        inputDiv.innerHTML += `
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500">${cat.replace('_', ' ')}</label>
                <input type="text" id="input-${cat}" value="${urls[cat] || ''}" class="w-full p-2 border rounded mt-1 text-sm" placeholder="Paste URL CSV di sini">
            </div>
        `;
    });

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.shiftKey && e.key === 'A') toggleAdmin();
    });

    function toggleAdmin() { document.getElementById('admin-modal').classList.toggle('hidden'); }

    function saveUrls() {
        categories.forEach(cat => { urls[cat] = document.getElementById(`input-${cat}`).value; });
        localStorage.setItem('sheet_urls', JSON.stringify(urls));
        toggleAdmin();
        refreshData();
    }

    async function refreshData() {
        document.getElementById('loading').classList.remove('hidden');
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        
        let allItems = [];
        for (const cat of categories) {
            if (urls[cat]) {
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(urls[cat])}`;
                try {
                    const res = await fetch(proxy);
                    const text = await res.text();
                    allItems = [...allItems, ...parseCSV(text, cat)];
                } catch (e) { console.error("Error cat " + cat); }
            }
        }
        render(allItems);
        document.getElementById('loading').classList.add('hidden');
    }

    function parseCSV(text, cat) {
        const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, '')));
        const headers = rows[0];
        
        const iNama = headers.indexOf('Nama Produk');
        const iHarga = headers.indexOf('Harga');
        const iLink = headers.indexOf('Link Komisi Ekstra');
        const iGambar = headers.indexOf('Gambar'); // Mencari kolom Gambar

        return rows.slice(1).map(r => {
            if (!r[iNama]) return null;
            let img = (iGambar !== -1 && r[iGambar]) ? r[iGambar] : '';
            
            // Jika link gambar dari shopee, kita bungkus pakai proxy Weserv agar muncul
            if (img.includes('shopee.co.id') || img.includes('shopeepay')) {
                img = `https://images.weserv.nl/?url=${encodeURIComponent(img)}`;
            } else if (!img) {
                // Jika tidak ada gambar, pakai placeholder
                img = `https://placehold.co/400x400/eeeeee/999999?text=No+Image`;
            }

            return { name: r[iNama], price: r[iHarga], link: r[iLink], img, cat };
        }).filter(x => x);
    }

    function render(data) {
        const grid = document.getElementById('product-grid');
        const filtered = currentCategory === 'all' ? data : data.filter(x => x.cat === currentCategory);
        
        grid.innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col">
                <div class="h-44 bg-gray-50 overflow-hidden">
                    <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Error+Image'">
                </div>
                <div class="p-4 flex flex-col flex-grow">
                    <p class="text-[10px] text-indigo-500 font-bold uppercase mb-1">${p.cat.replace('_',' ')}</p>
                    <h3 class="text-sm font-bold text-gray-700 line-clamp-2 h-10 mb-2">${p.name}</h3>
                    <p class="text-red-500 font-black text-lg mt-auto mb-3">${p.price}</p>
                    <a href="${p.link}" target="_blank" class="bg-indigo-600 text-white text-center py-2 rounded-lg text-sm font-bold">Beli</a>
                </div>
            </div>
        `).join('');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
        event.target.classList.add('active-cat');
        refreshData();
    }

    document.addEventListener('DOMContentLoaded', refreshData);
  </script>
</body>
</html>
