<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop - Katalog Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(4px); }
    .active-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

  <header class="bg-white border-b py-6 text-center">
    <h1 class="text-2xl font-extrabold text-indigo-600 tracking-tight">JOGRESTECH SHOP 🛍️</h1>
    <p class="text-gray-400 text-[10px] mt-1">Data Terupdate dari Google Sheets</p>
  </header>

  <nav class="sticky top-0 bg-white/90 backdrop-blur-md shadow-sm z-40 py-3 border-b">
    <div class="container mx-auto px-4 flex flex-wrap gap-2 justify-center">
        <button class="cat-btn active-cat px-4 py-1.5 rounded-full border text-[11px] font-bold transition-all" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn px-4 py-1.5 rounded-full border text-[11px] font-bold transition-all" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn px-4 py-1.5 rounded-full border text-[11px] font-bold transition-all" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
        <button class="cat-btn px-4 py-1.5 rounded-full border text-[11px] font-bold transition-all" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn px-4 py-1.5 rounded-full border text-[11px] font-bold transition-all" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn px-4 py-1.5 rounded-full border text-[11px] font-bold transition-all" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <div id="loading" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent mb-4"></div>
        <p class="font-bold text-gray-400 text-sm">Menghubungkan ke Database...</p>
    </div>
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
  </main>

  <button onclick="toggleAdmin()" class="fixed bottom-6 right-6 w-12 h-12 bg-gray-900 text-white rounded-full shadow-2xl flex items-center justify-center z-50 opacity-40 hover:opacity-100 transition-opacity">⚙️</button>

  <div id="admin-modal" class="modal hidden">
    <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">⚙️ Database Setup</h2>
        <button onclick="toggleAdmin()" class="text-gray-400 text-2xl">&times;</button>
      </div>
      <div class="space-y-4" id="url-inputs"></div>
      <button onclick="saveUrls()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold mt-8 shadow-lg hover:bg-indigo-700 transition-all">Simpan & Sync</button>
    </div>
  </div>

  <script>
    /* 1. LINK PERMANEN: Masukkan link Anda di kategori 'gadget' sebagai default */
    const PERMANENT_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgF5MMZPxfsL2x-79ToHXyO5apuywXk4KQWqWzHhRyF8aLj9ehMyX9-7qfaSZVq9VV3LSB-MmEyHPi/pub?gid=76655026&single=true&output=csv';

    const categories = ['gadget', 'elektronik', 'otomotif', 'sport', 'peralatan_rumah'];
    let currentCategory = 'all';
    
    // Ambil data dari LocalStorage, jika kosong pakai PERMANENT_LINK
    let urls = JSON.parse(localStorage.getItem('sheet_urls')) || {
        gadget: PERMANENT_LINK,
        elektronik: '',
        otomotif: '',
        sport: '',
        peralatan_rumah: ''
    };

    // Setup input admin
    const inputDiv = document.getElementById('url-inputs');
    categories.forEach(cat => {
        inputDiv.innerHTML += `
            <div>
                <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">${cat.replace('_',' ')}</label>
                <input type="text" id="input-${cat}" value="${urls[cat] || ''}" 
                       class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        `;
    });

    function toggleAdmin() { document.getElementById('admin-modal').classList.toggle('hidden'); }

    function saveUrls() {
        categories.forEach(cat => { urls[cat] = document.getElementById(`input-${cat}`).value; });
        localStorage.setItem('sheet_urls', JSON.stringify(urls));
        toggleAdmin();
        refreshData();
    }

    async function refreshData() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');
        loader.classList.remove('hidden');
        grid.innerHTML = '';
        
        let allItems = [];
        for (const cat of categories) {
            if (urls[cat]) {
                try {
                    // Gunakan proxy untuk menembus CORS
                    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(urls[cat])}`);
                    const text = await res.text();
                    allItems = [...allItems, ...parseCSV(text, cat)];
                } catch (e) { console.error("Error cat: " + cat); }
            }
        }
        render(allItems);
        loader.classList.add('hidden');
    }

    function parseCSV(text, cat) {
        const rows = text.split('\n').filter(l => l.trim() !== "").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, '')));
        if (rows.length < 1) return [];

        const headers = rows[0].map(h => h.toLowerCase());
        const iNama = headers.findIndex(h => h.includes('nama produk'));
        const iHarga = headers.findIndex(h => h.includes('harga'));
        const iLink = headers.findIndex(h => h.includes('komisi') || h.includes('link'));
        const iGambar = headers.findIndex(h => h.includes('gambar'));

        return rows.slice(1).map(r => {
            if (!r[iNama]) return null;
            let rawImg = (iGambar !== -1) ? r[iGambar] : '';
            let finalImg = rawImg 
                ? `https://images.weserv.nl/?url=${encodeURIComponent(rawImg)}&w=400&fit=cover` 
                : 'https://placehold.co/400x400/f3f4f6/a1a1aa?text=No+Image';

            return { name: r[iNama], price: r[iHarga] || 'Cek Harga', link: r[iLink], img: finalImg, cat: cat };
        }).filter(x => x);
    }

    function render(data) {
        const grid = document.getElementById('product-grid');
        const filtered = currentCategory === 'all' ? data : data.filter(x => x.cat === currentCategory);
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 text-sm">Data tidak ditemukan. Cek link di Panel Admin (⚙️).</div>`;
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col group">
                <div class="relative aspect-square bg-gray-50 overflow-hidden">
                    <img src="${p.img}" alt="Produk" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                         onerror="this.src='https://placehold.co/400x400?text=Error+Image'">
                </div>
                <div class="p-3 flex flex-col flex-grow">
                    <span class="text-[8px] font-black text-indigo-500 uppercase tracking-widest mb-1">${p.cat.replace('_',' ')}</span>
                    <h3 class="text-[11px] font-bold text-gray-800 line-clamp-2 h-7 mb-2 leading-tight">${p.name}</h3>
                    <div class="mt-auto">
                        <p class="text-red-600 font-extrabold text-sm mb-3">${p.price}</p>
                        <a href="${p.link}" target="_blank" rel="nofollow" 
                           class="block w-full bg-gray-900 text-white text-center py-2 rounded-xl text-[10px] font-bold hover:bg-indigo-600 transition-colors">
                           BELI SEKARANG
                        </a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active-cat');
            const txt = btn.innerText.toLowerCase();
            if (cat === 'all' && txt.includes('semua')) btn.classList.add('active-cat');
            else if (txt.includes(cat.replace('_',' '))) btn.classList.add('active-cat');
        });
        refreshData();
    }

    // Shortcut Ctrl+Shift+A untuk laptop
    document.addEventListener('keydown', e => { if (e.ctrlKey && e.shiftKey && e.key === 'A') toggleAdmin(); });
    document.addEventListener('DOMContentLoaded', refreshData);
  </script>
</body>
</html>
