<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop - Katalog Affiliate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); }
    .active-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hidden { display: none; }
  </style>
</head>
<body class="text-gray-900">

  <header class="bg-white border-b py-10 text-center">
    <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">JOGRESTECH SHOP 🛍️</h1>
    <p class="text-gray-400 mt-1 text-sm font-medium">Katalog Rekomendasi Affiliate Terupdate</p>
  </header>

  <nav class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-40 py-4 border-b">
    <div class="container mx-auto px-4 flex flex-wrap gap-2 justify-center">
        <button class="cat-btn active-cat px-6 py-2.5 rounded-2xl border text-xs font-bold transition-all" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn px-6 py-2.5 rounded-2xl border text-xs font-bold transition-all" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn px-6 py-2.5 rounded-2xl border text-xs font-bold transition-all" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
        <button class="cat-btn px-6 py-2.5 rounded-2xl border text-xs font-bold transition-all" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn px-6 py-2.5 rounded-2xl border text-xs font-bold transition-all" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn px-6 py-2.5 rounded-2xl border text-xs font-bold transition-all" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-12">
    <div id="loading" class="text-center py-20 hidden">
        <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent mb-4"></div>
        <p class="font-bold text-gray-400">Menyinkronkan data...</p>
    </div>
    
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
  </main>

  <script>
    /* ================= KONFIGURASI FILE ================= */
    const CSV_CONFIG = {
        gadget: 'gadget.csv',
        elektronik: 'elektronik.csv',
        otomotif: 'otomotif.csv',
        sport: 'sport.csv',
        peralatan_rumah: 'rumah.csv'
    };

    let currentCategory = 'all';

    /* ================= LOGIKA DATABASE ================= */

    async function fetchCSV(category) {
        const file = CSV_CONFIG[category];
        if (!file) return [];
        
        try {
            // Gunakan timestamp agar browser tidak mengambil data lama (anti-cache)
            const response = await fetch(`${file}?t=${new Date().getTime()}`);
            if (!response.ok) return [];
            const text = await response.text();
            return parseCSVData(text, category);
        } catch (error) {
            console.error(`Gagal memuat file: ${file}`);
            return [];
        }
    }

    function parseCSVData(text, categoryLabel) {
        // Regex cerdas untuk menangani koma di dalam tanda kutip (penting untuk link panjang)
        const rows = text.split('\n')
            .filter(row => row.trim() !== '')
            .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.trim().replace(/^"|"$/g, '')));
        
        if (rows.length < 2) return [];

        const headers = rows[0].map(h => h.toLowerCase());
        const iNama = headers.findIndex(h => h.includes('nama'));
        const iHarga = headers.findIndex(h => h.includes('harga'));
        const iLink = headers.findIndex(h => h.includes('link') || h.includes('komisi'));
        const iGambar = headers.findIndex(h => h.includes('gambar'));

        return rows.slice(1).map(r => {
            if (!r[iNama]) return null;

            // MEMBERSIHKAN LINK (Mencegah Error 400)
            let rawLink = r[iLink] || '#';
            let cleanLink = rawLink.replace(/\s/g, ''); // Hapus spasi liar
            if (cleanLink !== '#' && !cleanLink.startsWith('http')) {
                cleanLink = 'https://' + cleanLink;
            }

            let rawImg = r[iGambar] || '';
            // Proxy weserv untuk memastikan gambar Shopee muncul
            let imgFinal = rawImg 
                ? `https://images.weserv.nl/?url=${encodeURIComponent(rawImg.replace(/\s/g, ''))}&w=400&fit=cover` 
                : 'https://placehold.co/400x400/f3f4f6/a1a1aa?text=No+Image';

            return {
                name: r[iNama],
                price: r[iHarga] || 'Cek Harga',
                link: cleanLink,
                img: imgFinal,
                cat: categoryLabel
            };
        }).filter(item => item !== null);
    }

    async function startApp() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');
        
        loader.classList.remove('hidden');
        grid.innerHTML = '';

        let products = [];

        if (currentCategory === 'all') {
            const tasks = Object.keys(CSV_CONFIG).map(cat => fetchCSV(cat));
            const results = await Promise.all(tasks);
            products = results.flat();
        } else {
            products = await fetchCSV(currentCategory);
        }

        renderProducts(products);
        loader.classList.add('hidden');
    }

    function renderProducts(items) {
        const grid = document.getElementById('product-grid');
        
        if (items.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <p class="text-gray-400 text-sm">Belum ada produk di kategori ini.<br>Pastikan file CSV sudah diupload.</p>
                </div>`;
            return;
        }

        grid.innerHTML = items.map(p => `
            <div class="product-card bg-white rounded-3xl border border-gray-100 overflow-hidden flex flex-col group">
                <div class="relative aspect-square bg-gray-50 overflow-hidden">
                    <img src="${p.img}" alt="${p.name}" loading="lazy"
                         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                         onerror="this.src='https://placehold.co/400x400/eeeeee/999999?text=Error+Image'">
                </div>
                <div class="p-5 flex flex-col flex-grow">
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2">${p.cat.replace('_',' ')}</span>
                    <h3 class="text-sm font-bold text-gray-800 line-clamp-2 h-10 mb-3 leading-snug">${p.name}</h3>
                    <div class="mt-auto">
                        <p class="text-red-600 font-extrabold text-lg mb-4">${p.price}</p>
                        <a href="${p.link}" target="_blank" rel="noopener noreferrer" 
                           class="block w-full bg-gray-900 text-white text-center py-3 rounded-2xl text-xs font-bold hover:bg-indigo-600 transition-colors shadow-lg shadow-gray-200">
                           BELI SEKARANG
                        </a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        // Styling tombol aktif
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active-cat');
            if (btn.getAttribute('onclick').includes(`'${cat}'`)) {
                btn.classList.add('active-cat');
            }
        });
        startApp();
    }

    // Jalankan aplikasi
    document.addEventListener('DOMContentLoaded', startApp);
  </script>
</body>
</html>
