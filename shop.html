<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .product-card { transition: all 0.3s ease; }
    .active-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="text-gray-900">

  <header class="bg-white border-b py-8 text-center">
    <h1 class="text-3xl font-extrabold text-indigo-600">JOGRESTECH SHOP 🛍️</h1>
  </header>

  <nav class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-40 py-4 border-b">
    <div class="container mx-auto px-4 flex flex-wrap gap-2 justify-center">
        <button class="cat-btn active-cat px-6 py-2 rounded-xl border text-xs font-bold" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn px-6 py-2 rounded-xl border text-xs font-bold" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn px-6 py-2 rounded-xl border text-xs font-bold" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
        <button class="cat-btn px-6 py-2 rounded-xl border text-xs font-bold" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn px-6 py-2 rounded-xl border text-xs font-bold" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn px-6 py-2 rounded-xl border text-xs font-bold" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-10">
    <div id="loading" class="text-center py-20 hidden">
        <p class="animate-pulse font-bold text-gray-400">Loading Produk...</p>
    </div>
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
  </main>

  <script>
    const CSV_CONFIG = {
        gadget: 'gadget.csv',
        elektronik: 'elektronik.csv',
        otomotif: 'otomotif.csv',
        sport: 'sport.csv',
        peralatan_rumah: 'rumah.csv'
    };

    let currentCategory = 'all';

    // Fungsi khusus untuk membuka link (Anti-Block)
    function goToLink(url) {
        if (!url || url === '#') {
            alert('Link tidak tersedia');
            return;
        }
        // Membersihkan URL dari karakter aneh satu kali lagi sebelum dibuka
        const cleanUrl = url.trim().replace(/["']/g, '');
        window.open(cleanUrl, '_blank', 'noopener,noreferrer');
    }

    async function fetchCSV(category) {
        const file = CSV_CONFIG[category];
        try {
            const response = await fetch(`${file}?t=${Date.now()}`);
            if (!response.ok) return [];
            const text = await response.text();
            return parseCSVData(text, category);
        } catch (e) { return []; }
    }

    function parseCSVData(text, categoryLabel) {
        const rows = text.split('\n')
            .filter(row => row.trim() !== '')
            .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.trim()));
        
        if (rows.length < 2) return [];

        const headers = rows[0].map(h => h.toLowerCase());
        const iNama = headers.findIndex(h => h.includes('nama'));
        const iHarga = headers.findIndex(h => h.includes('harga'));
        const iLink = headers.findIndex(h => h.includes('link') || h.includes('komisi'));
        const iGambar = headers.findIndex(h => h.includes('gambar'));

        return rows.slice(1).map(r => {
            if (!r[iNama]) return null;

            // Ambil URL mentah dan bersihkan secara brutal
            let link = r[iLink] ? r[iLink].replace(/\s/g, '').replace(/^"|"$/g, '') : '#';
            if (link !== '#' && !link.startsWith('http')) link = 'https://' + link;

            let img = r[iGambar] ? r[iGambar].replace(/\s/g, '').replace(/^"|"$/g, '') : '';
            let imgFinal = img ? `https://images.weserv.nl/?url=${encodeURIComponent(img)}&w=400&fit=cover` : 'https://placehold.co/400x400?text=No+Image';

            return {
                name: r[iNama].replace(/^"|"$/g, ''),
                price: r[iHarga] ? r[iHarga].replace(/^"|"$/g, '') : 'Cek Harga',
                link: link,
                img: imgFinal,
                cat: categoryLabel
            };
        }).filter(item => item !== null);
    }

    async function startApp() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');
        loader.classList.remove('hidden');
        grid.innerHTML = '';

        let products = [];
        if (currentCategory === 'all') {
            const results = await Promise.all(Object.keys(CSV_CONFIG).map(cat => fetchCSV(cat)));
            products = results.flat();
        } else {
            products = await fetchCSV(currentCategory);
        }

        grid.innerHTML = products.map(p => `
            <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col shadow-sm hover:shadow-md">
                <div class="relative aspect-square bg-gray-50 overflow-hidden">
                    <img src="${p.img}" class="w-full h-full object-cover">
                </div>
                <div class="p-4 flex flex-col flex-grow">
                    <span class="text-[9px] font-bold text-indigo-500 uppercase mb-1">${p.cat}</span>
                    <h3 class="text-sm font-bold text-gray-800 line-clamp-2 h-10 mb-2">${p.name}</h3>
                    <div class="mt-auto">
                        <p class="text-red-600 font-extrabold text-lg mb-3">${p.price}</p>
                        <button onclick="goToLink('${p.link}')" 
                           class="w-full bg-gray-900 text-white text-center py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-600">
                           BELI SEKARANG
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
        loader.classList.add('hidden');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active-cat');
            if (btn.getAttribute('onclick').includes(`'${cat}'`)) btn.classList.add('active-cat');
        });
        startApp();
    }

    document.addEventListener('DOMContentLoaded', startApp);
  </script>
</body>
</html>
