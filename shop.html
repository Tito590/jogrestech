<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    .active-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

  <header class="bg-white border-b py-8 text-center">
    <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">JOGRESTECH SHOP 🛍️</h1>
    <p class="text-gray-500 mt-1 text-sm">Katalog Produk Affiliate</p>
  </header>

  <nav class="sticky top-0 bg-white/90 backdrop-blur-md shadow-sm z-40 py-4 border-b">
    <div class="container mx-auto px-4 flex flex-wrap gap-2 justify-center">
        <button class="cat-btn active-cat px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('all')">🌟 Semua</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('gadget')">📱 Gadget</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('elektronik')">🔌 Elektronik</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('otomotif')">🚗 Otomotif</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('sport')">⚽ Sport</button>
        <button class="cat-btn px-5 py-2 rounded-xl border text-xs font-bold transition-all" onclick="changeCategory('peralatan_rumah')">🏠 Rumah</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-10">
    <div id="loading" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent mb-4"></div>
        <p class="font-bold text-gray-400">Memuat Katalog...</p>
    </div>
    
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
  </main>

  <script>
    /* ================= HARDCODED SETTINGS ================= */
    // URL utama yang Anda berikan tadi
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgF5MMZPxfsL2x-79ToHXyO5apuywXk4KQWqWzHhRyF8aLj9ehMyX9-7qfaSZVq9VV3LSB-MmEyHPi/pub?gid=76655026&single=true&output=csv';

    // Semua kategori sementara pakai link yang sama. Ganti link di bawah jika ingin berbeda.
    const CATEGORY_URLS = {
        gadget: SHEET_URL,
        elektronik: SHEET_URL,
        otomotif: SHEET_URL,
        sport: SHEET_URL,
        peralatan_rumah: SHEET_URL
    };

    let currentCategory = 'all';

    /* ================= CORE LOGIC ================= */

    async function loadData() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');
        
        loader.classList.remove('hidden');
        grid.innerHTML = '';
        
        let allItems = [];
        
        // Loop untuk mengambil data dari semua kategori yang memiliki URL
        for (const cat in CATEGORY_URLS) {
            const url = CATEGORY_URLS[cat];
            if (url) {
                try {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                    const res = await fetch(proxyUrl);
                    const text = await res.text();
                    const items = parseCSV(text, cat);
                    allItems = [...allItems, ...items];
                } catch (e) {
                    console.error(`Gagal muat kategori ${cat}:`, e);
                }
            }
        }
        
        render(allItems);
        loader.classList.add('hidden');
    }

    function parseCSV(text, cat) {
        const rows = text.split('\n')
            .filter(row => row.trim() !== '')
            .map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, '')));
        
        if (rows.length < 2) return [];

        const headers = rows[0].map(h => h.toLowerCase());
        const iNama = headers.findIndex(h => h.includes('nama produk'));
        const iHarga = headers.findIndex(h => h.includes('harga'));
        const iLink = headers.findIndex(h => h.includes('komisi ekstra') || h.includes('link'));
        const iGambar = headers.findIndex(h => h.includes('gambar'));

        return rows.slice(1).map(r => {
            if (!r[iNama]) return null;
            
            let rawImg = (iGambar !== -1) ? r[iGambar] : '';
            // Gunakan proxy images.weserv.nl agar gambar Shopee muncul
            let finalImg = rawImg 
                ? `https://images.weserv.nl/?url=${encodeURIComponent(rawImg)}&w=400&fit=cover` 
                : 'https://placehold.co/400x400/f3f4f6/a1a1aa?text=No+Image';

            return {
                name: r[iNama],
                price: r[iHarga] || 'Cek Harga',
                link: r[iLink],
                img: finalImg,
                cat: cat
            };
        }).filter(item => item !== null);
    }

    function render(data) {
        const grid = document.getElementById('product-grid');
        const filtered = currentCategory === 'all' 
            ? data 
            : data.filter(item => item.cat === currentCategory);
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400">Belum ada produk untuk kategori ini.</div>`;
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col group">
                <div class="relative aspect-square bg-gray-50 overflow-hidden">
                    <img src="${p.img}" alt="${p.name}" 
                         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                         onerror="this.src='https://placehold.co/400x400/eeeeee/999999?text=Error+Image'">
                </div>
                <div class="p-4 flex flex-col flex-grow">
                    <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-1">${p.cat.replace('_',' ')}</span>
                    <h3 class="text-sm font-bold text-gray-800 line-clamp-2 h-10 mb-2 leading-tight">${p.name}</h3>
                    <div class="mt-auto">
                        <p class="text-red-600 font-extrabold text-lg mb-3">${p.price}</p>
                        <a href="${p.link}" target="_blank" rel="nofollow" 
                           class="block w-full bg-gray-900 text-white text-center py-2.5 rounded-xl text-xs font-bold hover:bg-indigo-600 transition-colors">
                           BELI SEKARANG
                        </a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function changeCategory(cat) {
        currentCategory = cat;
        // Update styling tombol navigasi
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.remove('active-cat');
            const btnText = btn.innerText.toLowerCase();
            if (cat === 'all' && btnText.includes('semua')) btn.classList.add('active-cat');
            else if (btnText.includes(cat.replace('_', ' '))) btn.classList.add('active-cat');
        });
        loadData();
    }

    // Jalankan saat halaman dimuat
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
