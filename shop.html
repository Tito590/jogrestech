<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .product-card { transition: all 0.3s ease; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hidden { display: none; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
  </style>
</head>
<body class="bg-gray-50">

  <header class="bg-white border-b py-6 text-center">
    <h1 class="text-2xl font-bold text-indigo-600">JOGRESTECH SHOP 🛍️</h1>
  </header>

  <main class="container mx-auto px-4 py-8">
    <div id="loading" class="text-center py-10">
      <p class="animate-bounce text-gray-400">Menghubungkan ke Sheets...</p>
    </div>
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
  </main>

  <button onclick="toggleAdmin()" class="fixed bottom-5 right-5 bg-gray-800 text-white p-3 rounded-full shadow-lg z-50">⚙️</button>

  <div id="admin-modal" class="modal hidden">
    <div class="bg-white p-6 rounded-2xl w-full max-w-md">
      <h2 class="font-bold mb-4">Pengaturan Link CSV</h2>
      <input type="text" id="csv-url" class="w-full p-2 border rounded mb-4 text-sm" placeholder="Masukkan Link CSV">
      <button onclick="saveAndRefresh()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Simpan & Update</button>
      <button onclick="toggleAdmin()" class="w-full mt-2 text-gray-400 text-xs">Tutup</button>
    </div>
  </div>

  <script>
    // 1. LINK DEFAULT (Link yang Anda berikan)
    const MY_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgF5MMZPxfsL2x-79ToHXyO5apuywXk4KQWqWzHhRyF8aLj9ehMyX9-7qfaSZVq9VV3LSB-MmEyHPi/pub?gid=76655026&single=true&output=csv";

    let currentUrl = localStorage.getItem('user_csv_url') || MY_SHEET_URL;

    function toggleAdmin() {
      document.getElementById('admin-modal').classList.toggle('hidden');
      document.getElementById('csv-url').value = currentUrl;
    }

    function saveAndRefresh() {
      const newUrl = document.getElementById('csv-url').value;
      localStorage.setItem('user_csv_url', newUrl);
      location.reload();
    }

    async function init() {
      try {
        // Menggunakan proxy untuk menembus keamanan browser
        const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(currentUrl)}`);
        const text = await res.text();
        const data = parseCSV(text);
        render(data);
      } catch (e) {
        document.getElementById('loading').innerHTML = "Gagal memuat data. Pastikan link CSV benar.";
      }
    }

    function parseCSV(text) {
      const lines = text.split('\n').filter(l => l.trim() !== "");
      const rows = lines.map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, '')));
      
      const headers = rows[0].map(h => h.toLowerCase());
      
      // Mencari kolom dengan kata kunci (tidak harus persis)
      const iNama = headers.findIndex(h => h.includes('nama'));
      const iHarga = headers.findIndex(h => h.includes('harga'));
      const iLink = headers.findIndex(h => h.includes('komisi') || h.includes('link'));
      const iGambar = headers.findIndex(h => h.includes('gambar') || h.includes('foto'));

      return rows.slice(1).map(r => {
        if (!r[iNama]) return null;
        
        let img = (iGambar !== -1 && r[iGambar]) ? r[iGambar] : "";
        // Gunakan proxy gambar agar Shopee tidak memblokir foto
        let finalImg = img ? `https://images.weserv.nl/?url=${encodeURIComponent(img)}&w=300&fit=cover` : "https://placehold.co/300x300?text=No+Image";

        return {
          name: r[iNama],
          price: r[iHarga] || "Cek Harga",
          link: r[iLink],
          img: finalImg
        };
      }).filter(x => x);
    }

    function render(items) {
      const grid = document.getElementById('product-grid');
      document.getElementById('loading').classList.add('hidden');
      
      if (items.length === 0) {
        grid.innerHTML = "<p class='col-span-full text-center text-gray-400'>Data tidak ditemukan di Sheet.</p>";
        return;
      }

      grid.innerHTML = items.map(p => `
        <div class="product-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
          <img src="${p.img}" class="w-full aspect-square object-cover" onerror="this.src='https://placehold.co/300x300?text=Error+Image'">
          <div class="p-3 flex flex-col flex-grow">
            <h3 class="text-xs font-semibold text-gray-700 line-clamp-2 h-8 mb-2">${p.name}</h3>
            <p class="text-red-500 font-bold text-sm mb-3">${p.price}</p>
            <a href="${p.link}" target="_blank" class="block w-full bg-indigo-600 text-white text-center py-2 rounded-lg text-[10px] font-bold">BELI</a>
          </div>
        </div>
      `).join('');
    }

    init();
  </script>
</body>
</html>
