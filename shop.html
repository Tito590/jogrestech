<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JogresTech Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    .product-card { background: white; border-radius: 1rem; overflow: hidden; border: 1px solid #e2e8f0; display: flex; flex-direction: column; height: 100%; transition: transform 0.2s; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="text-gray-900">

  <header class="bg-white border-b py-6 text-center shadow-sm">
    <h1 class="text-2xl font-extrabold text-indigo-600 tracking-tight">SPORT CATALOG ⚽</h1>
    <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest mt-1">JogresTech Affiliate</p>
  </header>

  <main class="container mx-auto px-4 py-8">
    <div id="loading" class="text-center py-20 font-bold text-gray-400">MEMUAT PRODUK...</div>
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
  </main>

  <script>
    // Path ke file JSON Anda (Pastikan file csvjson.json ada di folder yang sama di GitHub)
    const JSON_URL = "csvjson.json";

    async function loadData() {
        const grid = document.getElementById('product-grid');
        const loader = document.getElementById('loading');

        try {
            // Mengambil data JSON
            const response = await fetch(JSON_URL + '?t=' + Date.now());
            const products = await response.json();

            let cardsHtml = "";

            products.forEach(item => {
                // Mengambil link khusus dari kolom "Link Komisi Ekstra"
                let rawLink = item["Link Komisi Ekstra"] || "#";
                let cleanLink = rawLink.trim();
                
                // Sanitasi Link agar tidak diblokir
                if (cleanLink !== "#" && !cleanLink.startsWith("http")) {
                    cleanLink = "https://" + cleanLink;
                }

                // Gambar via proxy agar cepat dan stabil
                const imgRaw = item["Gambar"] || "";
                const imgFinal = imgRaw ? `https://images.weserv.nl/?url=${encodeURIComponent(imgRaw)}&w=400&fit=cover` : "https://placehold.co/400x400";

                cardsHtml += `
                    <div class="product-card hover:shadow-md">
                        <div class="aspect-square bg-gray-50">
                            <img src="${imgFinal}" class="w-full h-full object-cover" loading="lazy">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-[11px] font-bold text-gray-800 line-clamp-2 h-8 mb-2 leading-tight">${item["Nama Produk"]}</h3>
                            <div class="mt-auto">
                                <p class="text-red-600 font-extrabold text-sm mb-3">${item["Harga"]}</p>
                                
                                <a href="${cleanLink}" 
                                   target="_blank" 
                                   rel="noopener noreferrer" 
                                   referrerpolicy="no-referrer"
                                   class="block w-full bg-indigo-600 text-white text-center py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider active:scale-95 transition-transform">
                                   BELI SEKARANG
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = cardsHtml;
            loader.style.display = 'none';

        } catch (error) {
            console.error("Error loading JSON:", error);
            grid.innerHTML = `<p class="col-span-full text-center py-10 text-red-500">Gagal memuat file JSON. Pastikan file 'csvjson.json' sudah di-upload.</p>`;
            loader.style.display = 'none';
        }
    }

    window.onload = loadData;
  </script>
</body>
</html>
