<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkorBola Live - Mobile Fix</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --green: #22c55e;
            --amber: #fbbf24;
        }

        body { 
            background: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; text-align: center;
        }

        .card {
            background: var(--card); padding: 30px; border-radius: 20px;
            width: 85%; max-width: 350px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        button { 
            width: 100%; padding: 18px; font-size: 16px; font-weight: bold; 
            background: var(--green); border: none; border-radius: 12px; 
            color: white; cursor: pointer; transition: 0.2s;
        }

        button:disabled { background: #475569; opacity: 0.6; }

        #timer { font-size: 60px; color: var(--amber); margin: 20px 0; font-weight: 800; min-height: 72px; }
        #status { font-size: 14px; color: #94a3b8; margin-bottom: 20px; line-height: 1.4; }

        /* Panduan Khusus iPhone */
        #iosInstructions {
            display: none; background: white; color: black; position: fixed;
            bottom: 20px; width: 85%; max-width: 320px; padding: 20px;
            border-radius: 15px; text-align: left; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin:0 0 10px 0">SkorBola Pro</h2>
        <p id="status">Klik tombol di bawah untuk mengaktifkan notifikasi skor real-time.</p>
        <div id="timer"></div>
        <button id="btnAction" onclick="handleAction()">AKTIFKAN NOTIFIKASI</button>
    </div>

    <div id="iosInstructions">
        <b style="color:#007aff">Langkah Penting iPhone:</b><br>
        <ol style="padding-left: 20px; font-size: 13px; margin-top: 10px;">
            <li>Klik ikon <b>Share</b> (kotak panah ke atas).</li>
            <li>Scroll & klik <b>'Add to Home Screen'</b>.</li>
            <li>Buka 'SkorBola' dari layar utama HP Anda.</li>
        </ol>
        <button onclick="this.parentElement.style.display='none'" style="padding: 5px; font-size: 12px; background: #eee; color: #333;">Tutup</button>
    </div>

    <script>
        const btn = document.getElementById('btnAction');
        const timerText = document.getElementById('timer');
        const statusText = document.getElementById('status');

        // 1. Registrasi Service Worker di awal
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Service Worker Ready");
            });
        }

        // 2. Fungsi Utama (Dibuat async agar stabil)
        async function handleAction() {
            // Deteksi iOS Standalone
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

            // Jika iPhone tapi belum di-install ke Home Screen
            if (isIOS && !isStandalone) {
                document.getElementById('iosInstructions').style.display = 'block';
                return;
            }

            // Minta Izin (Harus dipicu langsung oleh klik user)
            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    startSimulation();
                } else {
                    alert("Izin ditolak. Silakan aktifkan melalui setelan gembok di browser.");
                }
            } catch (err) {
                alert("Browser ini tidak mendukung notifikasi.");
            }
        }

        function startSimulation() {
            btn.disabled = true;
            let count = 10;
            statusText.innerText = "Berhasil! Notifikasi akan muncul dalam:";

            const countdown = setInterval(() => {
                timerText.innerText = count;
                count--;
                if (count < 0) {
                    clearInterval(countdown);
                    timerText.innerText = "GOAL!";
                    sendNativeNotif(); // Panggil notifikasi
                    setTimeout(() => {
                        btn.disabled = false;
                        timerText.innerText = "";
                        statusText.innerText = "Klik untuk tes ulang";
                    }, 5000);
                }
            }, 1000);
        }

        function sendNativeNotif() {
            const title = "GOL!! ⚽";
            const options = {
                body: "Messi 78'\nArgentina 2 - 1 Prancis",
                icon: "https://flagcdn.com/w160/ar.png",
                badge: "https://flagcdn.com/w96/ar.png",
                vibrate: [500, 110, 500, 110, 450, 110, 200], // Getar ala WA
                tag: "goal-alert-" + Date.now(), // Tag unik agar muncul banner baru
                renotify: true,
                requireInteraction: true // Memaksa pop-up tidak hilang sendiri
            };

            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, options);
            });
        }
    </script>
</body>
</html>
