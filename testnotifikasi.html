<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkorBola Pro - Console Testing</title>
    <style>
        :root {
            --primary: #0047AB;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #38bdf8; text-align: center; }

        /* Widget UI */
        .match-widget {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .live-badge {
            background: #ef4444;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .team { text-align: center; font-size: 12px; font-weight: bold; }
        .team img { width: 40px; display: block; margin: 0 auto 8px; }
        .score { font-size: 42px; font-weight: 900; letter-spacing: -2px; }

        .activity-box {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            border-left: 4px solid #fbbf24;
        }

        /* Control Panel */
        .controls {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
        }

        .controls h3 { margin-top: 0; font-size: 14px; color: #94a3b8; }

        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-request { background: #38bdf8; color: #0f172a; }
        .btn-trigger { background: white; color: #0f172a; }
        .btn-trigger:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-text {
            font-size: 12px;
            text-align: center;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SkorBola Dashboard</h1>

        <div class="match-widget">
            <span class="live-badge">🔴 LIVE</span>
            <div class="score-row">
                <div class="team">
                    <img src="https://flagcdn.com/w80/ar.png" alt="ARG">
                    ARGENTINA
                </div>
                <div class="score">2 - 1</div>
                <div class="team">
                    <img src="https://flagcdn.com/w80/fr.png" alt="FRA">
                    PRANCIS
                </div>
            </div>
            <div class="activity-box">
                ⚽ <b>GOL!</b> L. Messi (78') - Penalti
            </div>
        </div>

        <div class="controls">
            <h3>TESTING PANEL</h3>
            <button class="btn-request" onclick="mintaIzin()">1. AKTIFKAN IZIN NOTIFIKASI</button>
            <button class="btn-trigger" id="btnNotif" onclick="kirimNotif()" disabled>2. SIMULASI GOL (PUSH)</button>
            <div class="status-text" id="statusLabel">Status Izin: Belum Aktif</div>
        </div>
    </div>

    <script>
        const statusLabel = document.getElementById('statusLabel');
        const btnNotif = document.getElementById('btnNotif');

        // Cek status izin saat halaman dimuat
        if (Notification.permission === 'granted') {
            updateStatus('granted');
        }

        function updateStatus(perm) {
            if (perm === 'granted') {
                statusLabel.innerText = "Status Izin: AKTIF (GRANTED)";
                statusLabel.style.color = "#4ade80";
                btnNotif.disabled = false;
            } else {
                statusLabel.innerText = "Status Izin: " + perm.toUpperCase();
            }
        }

        function mintaIzin() {
            Notification.requestPermission().then(permission => {
                updateStatus(permission);
                if (permission !== 'granted') {
                    alert("Izin ditolak. Klik ikon gembok di bar alamat browser untuk mereset izin.");
                }
            });
        }

        function kirimNotif() {
            if (Notification.permission === 'granted') {
                const title = "GOOOOLLLL! 🇦🇷";
                const options = {
                    body: "Lionel Messi mencetak gol! Argentina 2 - 1 Prancis. Klik untuk lihat reaksi fans!",
                    icon: "https://flagcdn.com/w160/ar.png",
                    badge: "https://flagcdn.com/w40/ar.png",
                    vibrate: [200, 100, 200],
                    requireInteraction: true, // Notifikasi tidak akan hilang sendiri
                    tag: 'goal-alert' // Mencegah spam (update di satu notifikasi saja)
                };

                // Pemicu Notifikasi
                try {
                    const n = new Notification(title, options);
                    
                    n.onclick = function() {
                        window.focus();
                        this.close();
                        alert("Anda akan diarahkan ke halaman Live Reaction!");
                    };
                } catch (e) {
                    alert("Gagal memicu notifikasi. Jika Anda menggunakan HP, pastikan website ini dibuka via HTTPS atau localhost.");
                    console.error(e);
                }
            }
        }
    </script>
</body>
</html>
