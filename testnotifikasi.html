<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkorBola Pro - Push Mode</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .token-area { margin-top: 20px; font-size: 10px; color: #fbbf24; word-break: break-all; background: #0f172a; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Push Notification</h2>
    <p id="status">Klik untuk mengaktifkan notifikasi "Memaksa"</p>
    <button onclick="aktifkanNotif()">AKTIFKAN</button>
    <div id="tokenDisplay" class="token-area"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "MASUKKAN_API_KEY_ANDA", // Ambil di Project Settings -> General
        projectId: "notifikasi-bola-6106d",
        messagingSenderId: "208387659179",
        appId: "MASUKKAN_APP_ID_ANDA" // Ambil di Project Settings -> General
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    async function aktifkanNotif() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                messaging.useServiceWorker(reg);

                const token = await messaging.getToken({ 
                    vapidKey: 'BCDaTK-JpBhQTm6tk2FgiDzDuLeOY2XJiuE8GNIg7QVIjJw0q2O7WXDeaHRh3zp470kibRoZsPzdgDOW-egSMww' 
                });

                if (token) {
                    document.getElementById('status').innerText = "🟢 TOKEN BERHASIL DIAMBIL";
                    document.getElementById('tokenDisplay').style.display = "block";
                    document.getElementById('tokenDisplay').innerText = token;
                    console.log("Token Anda:", token);
                }
            }
        } catch (err) {
            console.error("Gagal:", err);
            alert("Error: " + err.message);
        }
    }
</script>
</body>
</html>
