<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkorBola Live - User Side</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: #1e293b; padding: 40px 20px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        #status { color: #94a3b8; font-size: 14px; margin-bottom: 20px; min-height: 40px; }
        #displayNotif { font-size: 24px; color: #fbbf24; font-weight: bold; margin: 20px 0; }
        button { width: 100%; padding: 16px; background: #22c55e; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        #iosInstructions { display: none; background: white; color: black; position: fixed; bottom: 20px; width: 85%; padding: 20px; border-radius: 15px; text-align: left; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Score User</h2>
        <div id="status">Klik tombol untuk mulai menerima update dari Admin.</div>
        <div id="displayNotif"></div>
        <button onclick="handleAction()">AKTIFKAN MODE LIVE</button>
    </div>

    <div id="iosInstructions">
        <b>Penting untuk iPhone:</b><br>
        1. Klik ikon <b>Share</b> (panah ke atas).<br>
        2. Pilih <b>'Add to Home Screen'</b>.<br>
        3. Buka web dari layar utama HP.
    </div>

    <script>
        // Registrasi Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function handleAction() {
            // Pengecekan iPhone
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            if (isIOS && !isStandalone) {
                document.getElementById('iosInstructions').style.display = 'block';
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('status').innerText = "🔴 MODE LIVE AKTIF\nMenunggu update dari admin...";
                alert("Siap! Sekarang biarkan tab ini terbuka, dan kirim pesan dari halaman Admin.");
            }
        }

        // --- BACKEND LOKAL: MENDENGARKAN ADMIN ---
        window.addEventListener('storage', (event) => {
            if (event.key === 'broadcast_notif') {
                const data = JSON.parse(event.newValue);
                triggerLiveNotif(data.title, data.body);
            }
        });

        function triggerLiveNotif(judul, pesan) {
            const options = {
                body: pesan,
                icon: "https://flagcdn.com/w160/ar.png",
                badge: "https://flagcdn.com/w96/ar.png",
                vibrate: [500, 110, 500, 110, 450],
                tag: "live-update",
                renotify: true,
                requireInteraction: true
            };

            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(judul, options);
            });

            // Tampilkan teks di layar juga
            document.getElementById('displayNotif').innerText = judul;
            document.getElementById('status').innerText = pesan;
        }
    </script>
</body>
</html>
