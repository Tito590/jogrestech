<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkorBola - Mobile Test</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        button { padding: 20px 40px; font-size: 18px; font-weight: bold; background: #22c55e; border: none; border-radius: 12px; color: white; cursor: pointer; }
        #timer { font-size: 40px; margin: 20px; color: #fbbf24; }
    </style>
</head>
<body>

    <button id="btnAction" onclick="mulaiSimulasi()">TEST NOTIF HP (10s)</button>
    <div id="timer"></div>
    <div id="status">Status: Siap</div>

    <script>
        // Mendaftarkan Service Worker agar HP mengizinkan notifikasi melayang
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered"));
        }

        function mulaiSimulasi() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    let detik = 10;
                    const interval = setInterval(() => {
                        document.getElementById('timer').innerText = detik + "s";
                        detik--;
                        if (detik < 0) {
                            clearInterval(interval);
                            kirimNotifKeHP();
                        }
                    }, 1000);
                } else {
                    alert("Izin ditolak! Aktifkan di setelan browser HP.");
                }
            });
        }

        function kirimNotifKeHP() {
            const title = "GOL!! ⚽";
            const options = {
                body: "Messi 78'\nArgentina 2 - 1 Prancis",
                icon: "https://flagcdn.com/w160/ar.png",
                badge: "https://flagcdn.com/w96/ar.png",
                vibrate: [200, 100, 200, 100, 200],
                tag: "goal-notif",
                renotify: true,
                requireInteraction: true // Di HP, ini memaksa notif tidak hilang sendiri
            };

            // Menggunakan Service Worker untuk memicu notifikasi (Cara wajib di Mobile)
            navigator.serviceWorker.ready.then(registration => {
                registration.showNotification(title, options);
            });
        }
    </script>
</body>
</html>
