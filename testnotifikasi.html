<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score Pro - Fix Mode</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --amber: #fbbf24; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 24px; width: 85%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .status { margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
        #tokenDisplay { margin-top: 20px; font-size: 10px; color: var(--amber); word-break: break-all; background: #000; padding: 12px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Skor Bola Pro</h2>
    <div id="status" class="status">Klik untuk mengaktifkan Push Notification</div>
    <button onclick="aktifkanNotif()">AKTIFKAN SEKARANG</button>
    <div id="tokenDisplay"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBT6zaDaj9rPYMfjyDuGaelKV660EtlRGQ",
        authDomain: "notifikasi-firecloud.firebaseapp.com",
        projectId: "notifikasi-firecloud",
        storageBucket: "notifikasi-firecloud.firebasestorage.app",
        messagingSenderId: "208387659179",
        appId: "1:208387659179:android:c2635cfd94b6db5407eeee",
        databaseURL: "https://notifikasi-bola-6106d-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const messaging = firebase.messaging();

    async function aktifkanNotif() {
        const statusEl = document.getElementById('status');
        try {
            statusEl.innerText = "Meminta izin...";
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                // Perbaikan cara registrasi agar tidak error 'evaluation failed'
                // Ganti baris navigator.serviceWorker.register Anda dengan ini
const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js', {
    scope: './'});
                console.log("Service Worker aktif!");
                
                messaging.useServiceWorker(reg);

                const token = await messaging.getToken({ 
                    vapidKey: 'BCDaTK-JpBhQTm6tk2FgiDzDuLeOY2XJiuE8GNIg7QVIjJw0q2O7WXDeaHRh3zp470kibRoZsPzdgDOW-egSMww' 
                });

                if (token) {
                    // Simpan ke database
                    await db.ref('user_tokens/' + btoa(token).substring(0, 10)).set({ token: token });
                    
                    statusEl.innerHTML = "<b style='color:#22c55e'>🟢 NOTIFIKASI BERHASIL AKTIF</b>";
                    document.getElementById('tokenDisplay').style.display = "block";
                    document.getElementById('tokenDisplay').innerText = token;
                }
            }
        } catch (err) {
            console.error("Detail Error:", err);
            statusEl.innerText = "Gagal: " + err.message;
            alert("Terjadi masalah. Coba hapus data situs/cache browser Anda.");
        }
    }
</script>
</body>
</html>
