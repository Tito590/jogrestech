<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCM Module Mode</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #tokenArea { margin-top: 20px; font-size: 10px; color: #fbbf24; word-break: break-all; background: #000; padding: 10px; display: none; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Firebase v10+ Mode</h2>
    <p id="status">Klik tombol untuk mendaftarkan perangkat</p>
    <button id="btnNotif">AKTIFKAN NOTIFIKASI</button>
    <div id="tokenArea"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCgSdCqOCQiOL2Wk42DjQ3R_S4v2ndBUE",
    authDomain: "testing-notifikasi-e8936.firebaseapp.com",
    projectId: "testing-notifikasi-e8936",
    storageBucket: "testing-notifikasi-e8936.firebasestorage.app",
    messagingSenderId: "544881647344",
    appId: "1:544881647344:web:0bcaaf2b000791bbf32c35",
    measurementId: "G-TGCZR42BFC"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  async function requestPermission() {
    console.log('Meminta izin...');
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      try {
        const currentToken = await getToken(messaging, { 
          vapidKey: 'BPkgp5BCu3-Ejnhfkzt_6mm7nza6_-egsd1g7J6nR3PvCqHNgLNVQcSCjJOw78LZbWomQHFfbqzVZRW9KBd3K6E' 
        });
        
        if (currentToken) {
          document.getElementById('status').innerText = "🟢 Berhasil!";
          document.getElementById('tokenArea').style.display = "block";
          document.getElementById('tokenArea').innerText = currentToken;
          console.log('Token:', currentToken);
        } else {
          alert('Token tidak didapat. Cek VAPID Key.');
        }
      } catch (err) {
        console.log('Error saat ambil token:', err);
        alert('Gagal: ' + err.message);
      }
    } else {
      alert('Izin ditolak!');
    }
  }

  document.getElementById('btnNotif').addEventListener('click', requestPermission);
</script>
</body>
</html>
