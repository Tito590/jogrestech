<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging.js";

  // Konfigurasi Project Terbaru Anda
  const firebaseConfig = {
    apiKey: "AIzaSyDCgSdCqOCQiOL2Wk42DjQ3R_S4v2ndBUE",
    authDomain: "testing-notifikasi-e8936.firebaseapp.com",
    projectId: "test-notifikasi-496204", // Project ID dari OAuth JSON Anda
    messagingSenderId: "944433164212",    // Diambil dari digit awal client_id Anda
    appId: "1:544881647344:web:0bcaaf2b000791bbf32c35" 
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  async function requestPermission() {
    try {
      // Membersihkan Service Worker lama untuk menghindari konflik kredensial
      const registrations = await navigator.serviceWorker.getRegistrations();
      for(let registration of registrations) { registration.unregister(); }

      const reg = await navigator.serviceWorker.register('/jogrestech/firebase-messaging-sw.js');
      
      // Ambil Token dengan VAPID Key yang sudah Anda buat sebelumnya
      const currentToken = await getToken(messaging, { 
        serviceWorkerRegistration: reg,
        vapidKey: 'BPkgp5BCu3-Ejnhfkzt_6mm7nza6_-egsd1g7J6nR3PvCqHNgLNVQcSCjJOw78LZbWomQHffbqzVZRW9KBd3K6E' //
      });

      if (currentToken) {
        console.log('Token Sukses:', currentToken);
        document.getElementById('tokenArea').innerText = currentToken;
      }
    } catch (err) {
      console.error('Error Autentikasi:', err);
      alert('Pastikan domain tito590.github.io sudah di-whitelist di Firebase Console!');
    }
  }
  document.getElementById('btnNotif').addEventListener('click', requestPermission);
</script>
