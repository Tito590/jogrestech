<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkorBola Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://flagcdn.com/w160/ar.png">
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --amber: #fbbf24; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: var(--card); padding: 40px 20px; border-radius: 24px; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 18px; font-size: 16px; font-weight: bold; background: var(--green); border: none; border-radius: 14px; color: white; }
        #status { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
        #displayNotif { font-size: 28px; color: var(--amber); font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Score User</h2>
        <div id="status">🔴 Offline</div>
        <div id="displayNotif"></div>
        <button id="btnAction" onclick="handleAction()">AKTIFKAN MODE LIVE</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const pusher = new Pusher('721813175cbf35310ab8', {
            cluster: 'ap1',
            forceTLS: true
        });

        const channel = pusher.subscribe('cache-skorbola');

        async function handleAction() {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('status').innerText = "🟢 Menunggu Update Live...";
                alert("Sistem Aktif! Menunggu sinyal dari Admin.");
            } else {
                alert("Izin notifikasi tidak diberikan.");
            }
        }

        // Menerima Sinyal
        channel.bind('client-new-score', function(data) {
            console.log("Data diterima:", data);
            triggerLiveNotif(data.title, data.body);
        });

        function triggerLiveNotif(judul, pesan) {
            document.getElementById('displayNotif').innerText = judul;
            document.getElementById('status').innerText = pesan;
            
            const options = {
                body: pesan,
                icon: "https://flagcdn.com/w160/ar.png",
                badge: "https://flagcdn.com/w96/ar.png",
                vibrate: [500, 100, 500],
                requireInteraction: true
            };

            // Notifikasi Banner
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(judul, options);
            });
            
            // Backup
            try { new Notification(judul, options); } catch(e) {}
        }
    </script>
</body>
</html>
