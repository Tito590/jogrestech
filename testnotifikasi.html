<!DOCTYPE html>
<html>
<head>
    <title>User - Live Score Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 100px;">

    <div id="status_box">
        <h2 id="status_text">Status: Notifikasi Belum Aktif</h2>
        <button onclick="mintaIzin()" style="padding: 15px 30px; background: #22c55e; color: white; border: none; border-radius: 10px; cursor: pointer;">AKTIFKAN NOTIFIKASI LIVE</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBT6zaDaj9rPYMfjyDuGaelKV660EtlRGQ",
            databaseURL: "https://notifikasi-bola-6106d-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function mintaIzin() {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('status_text').innerText = "Status: Notifikasi Aktif 🟢";
                    mulaiMendengar();
                } else {
                    alert("Sila benarkan notifikasi di browser anda.");
                }
            });
        }

        function mulaiMendengar() {
            // Monitor perubahan di database secara realtime
            db.ref('notifikasi_live').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // Tampilkan Notifikasi Desktop/HP
                    new Notification(data.judul, {
                        body: data.isi,
                        icon: 'https://flagcdn.com/w160/ar.png'
                    });
                    console.log("Pesan diterima:", data);
                }
            });
        }
    </script>
</body>
</html>
