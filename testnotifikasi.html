<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Score Notification</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:disabled { background-color: #444; }
        #timer { margin-top: 15px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <button id="btnStart" onclick="startTrial()">AKTIFKAN NOTIFIKASI ASLI</button>
    <div id="timer">Klik tombol untuk mulai hitung mundur 10 detik</div>

    <script>
        const btn = document.getElementById('btnStart');
        const timerText = document.getElementById('timer');

        function startTrial() {
            // Langkah 1: Minta Izin (Wajib untuk notifikasi bawaan browser)
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    runCountdown();
                } else {
                    alert("Izin ditolak. Notifikasi asli tidak bisa muncul tanpa izin.");
                }
            });
        }

        function runCountdown() {
            btn.disabled = true;
            let count = 10;
            
            const interval = setInterval(() => {
                count--;
                timerText.innerText = `Notifikasi muncul dalam ${count} detik...`;
                
                if (count <= 0) {
                    clearInterval(interval);
                    timerText.innerText = "Terkirim!";
                    triggerNativeNotif();
                    btn.disabled = false;
                }
            }, 1000);
        }

        function triggerNativeNotif() {
            // Langkah 2: Pemicu Notifikasi Bawaan Browser
            const title = "GOL!!";
            const options = {
                body: "Messi 78'",
                icon: "https://flagcdn.com/w80/ar.png", // Ikon kecil
                silent: false, // Biar ada bunyi default HP
                requireInteraction: false // Hilang otomatis seperti chat
            };

            // Kirim notifikasi
            new Notification(title, options);
        }
    </script>
</body>
</html>
