<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkorBola Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://flagcdn.com/w160/ar.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --amber: #fbbf24; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: var(--card); padding: 40px 20px; border-radius: 24px; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 18px; font-size: 16px; font-weight: bold; background: var(--green); border: none; border-radius: 14px; color: white; cursor: pointer; }
        #status { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
        #displayNotif { font-size: 28px; color: var(--amber); font-weight: bold; margin: 20px 0; min-height: 40px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Live Score User</h2>
        <div id="status">Ketuk tombol untuk mengaktifkan</div>
        <div id="displayNotif"></div>
        <button onclick="handleAction()">AKTIFKAN MODE LIVE</button>
    </div>

    <script>
        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            databaseURL: "https://notifikasi-bola-6106d-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Registrasi Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function handleAction() {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('status').innerText = "🟢 MODE LIVE AKTIF";
                alert("Siap menerima update dari Admin!");
            } else {
                alert("Izin notifikasi ditolak. Cek pengaturan HP.");
            }
        }

        // MENDENGARKAN PERUBAHAN DATA (REAL-TIME)
        db.ref('live_update').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.timestamp) {
                console.log("Data Firebase masuk:", data);
                triggerLiveNotif(data.title, data.message);
            }
        });

        function triggerLiveNotif(judul, pesan) {
            // Update tampilan halaman
            document.getElementById('displayNotif').innerText = judul;
            document.getElementById('status').innerText = pesan;
            
            const options = {
                body: pesan,
                icon: "https://flagcdn.com/w160/ar.png",
                vibrate: [500, 100, 500],
                requireInteraction: true,
                tag: 'bola-notif'
            };

            // Kirim Notifikasi Sistem
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(judul, options);
            });
            
            // Backup untuk iOS Standalone
            try { new Notification(judul, options); } catch(e) {}
        }
    </script>
</body>
</html>
