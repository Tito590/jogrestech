<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkorBola Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://image-cdn.hypb.st/https%3A%2F%2Fid.hypebeast.com%2Ffiles%2F2023%2F05%2Ffifa-luncurkan-logo-piala-dunia-2026-02.jpeg?w=960&cbr=1&q=90&fit=max">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --amber: #fbbf24; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: var(--card); padding: 40px 20px; border-radius: 24px; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 18px; font-size: 16px; font-weight: bold; background: var(--green); border: none; border-radius: 14px; color: white; cursor: pointer; }
        #status { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
        #displayNotif { font-size: 28px; color: var(--amber); font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Live Score</h2>
        <div id="status">Aktifkan untuk menerima skor</div>
        <div id="displayNotif"></div>
        <button onclick="handleAction()">AKTIFKAN MODE LIVE</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://notifikasi-bola-6106d-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let swRegistration = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                swRegistration = reg;
            });
        }

        async function handleAction() {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('status').innerText = "🟢 MODE LIVE AKTIF";
                alert("Siap! Sekarang coba minimize aplikasi ini.");
            }
        }

        // Mendengarkan Firebase
        db.ref('live_update').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.timestamp) {
                document.getElementById('displayNotif').innerText = data.title;
                document.getElementById('status').innerText = data.message;
                
                // KIRIM PESAN KE SERVICE WORKER AGAR TETAP MUNCUL SAAT MINIMIZE
                if (swRegistration) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'SHOW_NOTIFICATION',
                        title: data.title,
                        body: data.message
                    });
                }
            }
        });
        // Cek apakah browser mendukung Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Sistem PWA Aktif!'))
      .catch(err => console.error('Gagal instalasi sistem:', err));
  });
}

// Trigger Otomatis Tombol Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Munculkan tombol atau alert otomatis untuk install
  showInstallBanner(); 
});

function showInstallBanner() {
  const confirmInstall = confirm("Pasang Widget SkorBola di Layar Utama?");
  if (confirmInstall && deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choice) => {
      if (choice.outcome === 'accepted') {
        console.log('User menginstal aplikasi');
      }
      deferredPrompt = null;
    });
  }
}
    </script>
</body>
</html>
