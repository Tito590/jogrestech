<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KLY Tug Of War</title>
<style>
*{
  margin:0; padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

html,body{
  width:100%; height:100%;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  touch-action:none;
}

body{
  background:url("https://github.com/Tito590/jogrestech/blob/main/bgvertical.png?raw=true") center center / cover no-repeat fixed;
}

/* ── LAYOUT UTAMA ── */
#game{
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  overflow:hidden;
}

/* ── TOP AREA: timer + difficulty ── */
#top-bar{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:14px;
  gap:8px;
  z-index:20;
  flex-shrink:0;
}

#timer-display{
  font-size:clamp(22px,6vw,52px);
  font-weight:bold;
  color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
  background:rgba(0,0,0,.45);
  padding:4px 22px;
  border-radius:12px;
  display:none;
  line-height:1.2;
}

.difficulty-select{
  display:none;
  gap:8px;
}

.difficulty-select button{
  padding:6px 14px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:13px;
  background:rgba(255,255,255,.85);
}

.difficulty-select button.active-diff{
  outline:3px solid #fff;
  background:#ffe082;
}

/* ── ARENA: area karakter, mengisi sisa ruang ── */
#arena{
  flex:1;
  width:100%;
  position:relative;
  overflow:hidden;
}

/* Karakter — menempel ke dasar arena */
#player{
  position:absolute;
  left:50%;
  bottom: 200px;
  width:min(110vw, 600px);
  transform:translateX(-50%);
  transition:transform .08s linear;
  z-index:5;
}

#player img{
  width:100%;
  display:block;
}

/* ── BOTTOM CONTROLS ── */
#controls{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 18px 18px;
  flex-shrink:0;
  z-index:10;
}

.tap-btn{
  width:min(28vw, 130px);
  cursor:pointer;
  transition:.1s;
  flex-shrink:0;
}

.tap-btn:active{ transform:scale(.93); }

.tap-btn img{
  width:100%;
  display:block;
}

/* ── WINNER OVERLAY ── */
#winner{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.78);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  font-size:clamp(24px,6vw,64px);
  font-weight:bold;
  z-index:999;
  text-align:center;
  padding:20px;
}

#winner button{
  margin-top:24px;
  padding:14px 40px;
  font-size:18px;
  cursor:pointer;
  border-radius:12px;
  border:none;
  background:#fff;
  font-weight:bold;
}

/* ── MODE SELECT OVERLAY ── */
#mode-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.mode-box{
  background:#1a1a2e;
  border:3px solid #fff;
  border-radius:24px;
  padding:36px 40px;
  text-align:center;
  color:#fff;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
  max-width:88vw;
  width:360px;
}

.mode-box h2{
  font-size:clamp(20px,5vw,30px);
  margin-bottom:8px;
  letter-spacing:1px;
}

.mode-box p{
  font-size:13px;
  color:#bbb;
  margin-bottom:28px;
}

.mode-buttons{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:center;
}

.mode-btn{
  width:100%;
  padding:16px 24px;
  font-size:17px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  cursor:pointer;
  transition:.15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:#fff;
}

.mode-btn:active{ transform:scale(.97); }

.mode-btn.online{
  background:linear-gradient(135deg,#00b4d8,#0077b6);
}

.mode-btn.offline{
  background:linear-gradient(135deg,#43aa8b,#264653);
}

.mode-btn span.icon{ font-size:22px; }
</style>
</head>

<body>

<!-- MODE SELECT OVERLAY -->
<div id="mode-overlay">
  <div class="mode-box">
    <h2>🏆 KLY Tug Of War</h2>
    <p>Pilih mode permainan</p>
    <div class="mode-buttons">
      <button class="mode-btn online" onclick="chooseMode('online')">
        <span class="icon">🤖</span> Online (vs Bot)
      </button>
      <button class="mode-btn offline" onclick="chooseMode('offline')">
        <span class="icon">👥</span> Offline (2 Player)
      </button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game">

  <div id="top-bar">
    <div id="timer-display">100</div>
    <div class="difficulty-select" id="diffSelect">
      <button id="btn-easy"   onclick="setDifficulty('easy')">Easy</button>
      <button id="btn-medium" class="active-diff" onclick="setDifficulty('medium')">Medium</button>
      <button id="btn-hard"   onclick="setDifficulty('hard')">Hard</button>
    </div>
  </div>

  <div id="arena">
    <div id="player">
      <img src="https://github.com/Tito590/jogrestech/blob/main/Desain%20tanpa%20judul%20(1).png?raw=true">
    </div>
  </div>

  <div id="controls">
    <div class="tap-btn" id="leftBtn">
      <img src="https://github.com/Tito590/jogrestech/blob/main/tap%20kiri.png?raw=true">
    </div>
    <div class="tap-btn" id="rightBtn">
      <img src="https://github.com/Tito590/jogrestech/blob/main/tap%20kanan.png?raw=true">
    </div>
  </div>

</div>

<!-- WINNER -->
<div id="winner">
  <div id="winnerText"></div>
  <button onclick="location.reload()">Main Lagi</button>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
let currentMode       = null;
let difficulty        = "medium";
let position          = 0;      // negatif = kiri menang, positif = kanan/bot menang
let gameOver          = false;
let time              = 100;
let botInterval       = null;
let countdownInterval = null;

const WIN_LIMIT = 280; // pixel offset untuk menentukan pemenang

// ── DOM ────────────────────────────────────────────────
const playerEl     = document.getElementById("player");
const leftBtn      = document.getElementById("leftBtn");
const rightBtn     = document.getElementById("rightBtn");
const winnerEl     = document.getElementById("winner");
const winnerText   = document.getElementById("winnerText");
const timerDisplay = document.getElementById("timer-display");
const diffSelect   = document.getElementById("diffSelect");

// ── MODE SELECT ───────────────────────────────────────
function chooseMode(mode){
  currentMode = mode;
  document.getElementById("mode-overlay").style.display = "none";

  if(mode === "online"){
    diffSelect.style.display = "flex";
    timerDisplay.style.display = "block";
    startTimer();
    startBot();
  } else {
    startTimerOffline();
  }
}

// ── PLAYER MOVEMENT ───────────────────────────────────
function updatePlayer(){
  playerEl.style.transform = `translateX(calc(-50% + ${position}px))`;

  if(position <= -WIN_LIMIT) finish("PLAYER KIRI MENANG! 🎉");
  if(position >=  WIN_LIMIT) finish("PLAYER KANAN MENANG! 🎉");
}

function finish(text){
  if(gameOver) return;
  gameOver = true;
  clearInterval(botInterval);
  clearInterval(countdownInterval);
  winnerEl.style.display = "flex";
  winnerText.innerHTML = text;
}

function tapLeft(){
  if(gameOver) return;
  position -= 15;
  updatePlayer();
}

function tapRight(){
  if(gameOver) return;
  position += 15;
  updatePlayer();
}

// ── TIMER ONLINE ──────────────────────────────────────
function startTimer(){
  clearInterval(countdownInterval);
  time = 100;
  timerDisplay.innerHTML = time;
  countdownInterval = setInterval(()=>{
    if(gameOver){ clearInterval(countdownInterval); return; }
    time--;
    timerDisplay.innerHTML = time;
    if(time <= 0){
      clearInterval(countdownInterval);
      if(position < 0)      finish("PLAYER KIRI MENANG! 🎉");
      else if(position > 0) finish("PLAYER KANAN MENANG! 🎉");
      else                  finish("DRAW! 🤝");
    }
  }, 1000);
}

// ── TIMER OFFLINE ─────────────────────────────────────
function startTimerOffline(){
  clearInterval(countdownInterval);
  time = 100;
  countdownInterval = setInterval(()=>{
    if(gameOver){ clearInterval(countdownInterval); return; }
    time--;
    if(time <= 0){
      clearInterval(countdownInterval);
      if(position < 0)      finish("PLAYER KIRI MENANG!");
      else if(position > 0) finish("PLAYER KANAN MENANG!");
      else                  finish("DRAW!");
    }
  }, 1000);
}

// ── BOT ───────────────────────────────────────────────
function startBot(){
  clearInterval(botInterval);
  let chance, power;
  switch(difficulty){
    case "easy":   chance=0.45; power=8;  break;
    case "medium": chance=0.70; power=10; break;
    case "hard":   chance=0.90; power=13; break;
    default:       chance=0.70; power=10;
  }
  botInterval = setInterval(()=>{
    if(gameOver){ clearInterval(botInterval); return; }
    if(Math.random() < chance){ position += power; updatePlayer(); }
  }, 100);
}

// ── DIFFICULTY ────────────────────────────────────────
function setDifficulty(level){
  if(gameOver) return;
  difficulty = level;
  ["easy","medium","hard"].forEach(d=>{
    document.getElementById("btn-"+d).classList.toggle("active-diff", d===level);
  });
  startBot();
}

// ── INPUT ─────────────────────────────────────────────
leftBtn.addEventListener("click",  tapLeft);
leftBtn.addEventListener("touchstart", e=>{ e.preventDefault(); tapLeft(); }, {passive:false});

rightBtn.addEventListener("click", tapRight);
rightBtn.addEventListener("touchstart", e=>{ e.preventDefault(); tapRight(); }, {passive:false});

document.addEventListener("keydown", e=>{
  if(gameOver) return;
  const k = e.key.toLowerCase();
  if(k==="z"||k==="arrowleft")              tapLeft();
  if(k==="."||k===">"||k==="arrowright")    tapRight();
});
</script>

</body>
</html>
