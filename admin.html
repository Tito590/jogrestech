<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 320px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; border: none; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Admin SkorBola</h3>
        <input type="text" id="title" placeholder="Contoh: GOL!! ⚽">
        <input type="text" id="message" placeholder="Contoh: Messi 78'">
        <button onclick="sendUpdate()">KIRIM KE SEMUA HP</button>
        <p id="info" style="font-size: 11px; color: #94a3b8; text-align: center;">Mengirim via Firebase Realtime</p>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://notifikasi-bola-6106d-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendUpdate() {
            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;

            if(!title || !message) return alert("Isi data dulu!");

            // Menulis data ke Firebase
            db.ref('live_update').set({
                title: title,
                message: message,
                timestamp: Date.now() // Timestamp agar User tahu ini data baru
            }).then(() => {
                alert("Berhasil Terkirim!");
            }).catch((error) => {
                alert("Gagal: " + error.message);
            });
        }
    </script>
</body>
</html>
