<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Live Score</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; text-align: center; font-family: sans-serif;">
        <h2>Kirim Update Skor</h2>
        <input type="text" id="judul" placeholder="Contoh: GOL! Indonesia" style="width: 100%; padding: 10px; margin-bottom: 10px;"><br>
        <textarea id="isi" placeholder="Isi Pesan (Contoh: Skor sekarang 1-0)" style="width: 100%; padding: 10px; height: 100px;"></textarea><br>
        <button onclick="kirim()" style="width: 100%; padding: 15px; background: #22c55e; color: white; border: none; cursor: pointer; font-weight: bold;">KIRIM NOTIFIKASI</button>
    </div>

    <script>
        // Gunakan API Key dari google-services.json anda
        const firebaseConfig = {
            apiKey: "AIzaSyBT6zaDaj9rPYMfjyDuGaelKV660EtlRGQ",
            databaseURL: "https://nottif2-49dac-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function kirim() {
            const judul = document.getElementById('judul').value;
            const isi = document.getElementById('isi').value;
            
            if(!judul || !isi) return alert("Isi judul dan pesan!");

            db.ref('notifikasi_live').set({
                judul: judul,
                isi: isi,
                waktu: Date.now()
            }).then(() => {
                alert("Berhasil dikirim ke Database!");
            }).catch(err => alert("Gagal: " + err.message));
        }
    </script>
</body>
</html>
