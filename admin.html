<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Pusher Fix</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 320px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; border: none; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Admin SkorBola</h3>
        <input type="text" id="title" placeholder="Judul: GOL!!">
        <input type="text" id="message" placeholder="Pesan: Messi 78'">
        <button onclick="sendUpdate()">KIRIM SEKARANG</button>
        <div id="status" style="font-size:11px; text-align:center; margin-top:10px; color:#94a3b8;">Menghubungkan...</div>
    </div>

    <script>
        // Menggunakan library Pusher
        const pusher = new Pusher('721813175cbf35310ab8', {
            cluster: 'ap1',
            forceTLS: true
        });

        // CHANNEL WAJIB DIAWALI 'private-'
        const channel = pusher.subscribe('private-skorbola');

        pusher.connection.bind('connected', () => {
            document.getElementById('status').innerText = "🟢 Terhubung ke Server";
        });

        function sendUpdate() {
            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;

            if(!title || !message) return alert("Isi data dulu!");

            // Mengirim event
            const triggered = channel.trigger('client-new-score', {
                title: title,
                body: message
            });

            if(triggered) {
                alert("Berhasil dikirim!");
            } else {
                alert("Gagal! Pastikan 'Enable Client Events' di App Settings Pusher sudah ON.");
            }
        }
    </script>
</body>
</html>
