<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Pusher Live</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 320px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; border: none; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
        #status { font-size: 11px; text-align: center; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Admin SkorBola</h3>
        <input type="text" id="title" placeholder="Judul (Contoh: GOL!! ⚽)">
        <input type="text" id="message" placeholder="Pesan (Contoh: Messi 78')">
        <button onclick="sendUpdate()">KIRIM KE IPHONE</button>
        <div id="status">Menghubungkan...</div>
    </div>

    <script>
        // Pakai 'ap1' sesuai cluster Anda
        const pusher = new Pusher('721813175cbf35310ab8', {
            cluster: 'ap1',
            forceTLS: true
        });

        // Kita pakai channel 'cache-' agar bisa client-event tanpa auth server
        const channel = pusher.subscribe('cache-skorbola');

        pusher.connection.bind('connected', () => {
            document.getElementById('status').innerText = "🟢 Terhubung ke Global Server";
        });

        function sendUpdate() {
            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;

            if(!title || !message) return alert("Isi data dulu!");

            // Mengirim sinyal Global
            channel.trigger('client-new-score', {
                title: title,
                body: message
            });

            alert("Terkirim ke iPhone!");
        }
    </script>
</body>
</html>
